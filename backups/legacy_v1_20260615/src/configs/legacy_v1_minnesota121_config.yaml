seed: 42
model_version: v1
features:
  - navalt
  - alt
  - h
  - navvn
  - navve
  - navvd
  - vn
  - ve
  - vd
  - p
  - q
  - r
data:
  seq_len: 32
  stride: 1
  eval_stride: 32
  train_val_split: 0.9
  batch_size: 256
  num_workers: 0
  label_col: label
  time_col: time
  scaler_type: minmax
  train_path: datasets/finetune/minnesota/minnesota618/train_flight104.csv
  test_paths:
    - datasets/finetune/minnesota/minnesota618/ThorFlight121.csv
model:
  hidden_size: 128
  num_layers: 4
  num_heads: 4
  ffn_size: 512
  dropout: 0.1
  rms_norm_eps: 0.000001
  rope_theta: 10000.0
optimization:
  lr: 0.0002
  weight_decay: 0.01
  loss: mse
trainer:
  max_epochs: 50
  early_stopping_patience: 7
  accelerator: auto
  devices: 1
  precision: 32-true
  log_every_n_steps: 20
  deterministic: true
finetune:
  pretrained_checkpoint: null
  checkpoint: null
  batch_size: 256
  lr: 0.0002
  trainer:
    max_epochs: 50
evaluation:
  threshold_percentile: 95
outputs:
  root_dir: outputs/uav_ad_model_v1_legacy_minnesota
