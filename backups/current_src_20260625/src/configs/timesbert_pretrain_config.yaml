seed: 42
model_id: timebert-base

data:
  # data path
  root_path: datasets/pretrain/minnesota/raw_split
  pattern: ThorFlight*.csv

  # fields
  target_fields:
    - navalt
    - alt
    - h
    - navvn
    - navve
    - navvd
    - vn
    - ve
    - vd
    - p
    - q
    - r
  label_col: label
  timestamp_col: time

  seq_len: 40
  stride: 1
  train_val_split: 0.9
  batch_size: 256
  num_workers: 4

model:
  d_model: 128
  n_heads: 4
  num_layers: 2
  d_ffn: 256
  patch_len: 4
  dropout: 0.1
  activation: gelu

optimization:
  lr: 0.0001
  weight_decay: 0.0001

trainer:
  max_epochs: 50
  early_stopping_patience: 3
  accelerator: auto
  devices: 1
  precision: 32-true
  log_every_n_steps: 20
  deterministic: false
  mask_ratio: 0.25

checkpoint:
  root_dir: checkpoints
  filename: "{epoch:03d}-{val_loss:.6f}"
  monitor: val_loss
  mode: min
  save_top_k: 1
  save_last: true

logging:
  save_dir: lightning_logs

export:
  save_dir: PretrainedModels/
  export_best: true
