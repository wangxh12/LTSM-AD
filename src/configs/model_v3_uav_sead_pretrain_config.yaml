seed: 42
model_family: model_v3
model_id: model-v3-uav-sead-base

data:
  dataset_name: uav_sead_normal_20hz
  root_path: /workspace/code/datasets/UAV_SEAD/processed_normal/20hz/ulg_files
  pattern: "*.csv"

  target_fields:
    - imu.gyro_x
    - imu.gyro_y
    - imu.gyro_z
    - imu.accel_x
    - imu.accel_y
    - imu.accel_z
    - magnetic_field.x
    - magnetic_field.y
    - magnetic_field.z
    - baro.pressure_pa
    - baro.temperature_c
    - attitude.roll
    - attitude.pitch
    - attitude.yaw
  label_col: null
  timestamp_col: time_s

  seq_len: 40
  stride: 1
  train_val_split: 0.9
  batch_size: 1024
  num_workers: 0
  scaler_type: standard # minmax

model:
  patch_size: 4
  d_model: 128
  num_layers: 4
  num_heads: 4
  d_ffn: 256
  dropout: 0.1
  causal: false

optimization:
  lr: 0.0001
  weight_decay: 0.0001
  betas: [0.9, 0.99]
  scheduler:
    type: cosine_annealing
    t_max_steps: 30000
    eta_min: 0.0000002

trainer:
  max_steps: 30000
  accelerator: auto
  devices: 1
  precision: 32-true
  log_every_n_steps: 20
  deterministic: false
  mask_ratio: 0.25
  num_sanity_val_steps: 0

early_stopping:
  enabled: false
  monitor: val_loss
  mode: min
  patience: 8
  min_delta: 0.0

checkpoint:
  root_dir: checkpoints
  filename: "{epoch:03d}-{val_loss:.6f}"
  monitor: val_loss
  mode: min
  save_top_k: 1
  save_last: true

logging:
  save_dir: lightning_logs

export:
  save_dir: PretrainedModels
  export_best: true
