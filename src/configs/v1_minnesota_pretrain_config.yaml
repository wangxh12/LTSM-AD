seed: 42
model_family: model_v1
model_id: v1-minnesota-base

data:
  dataset_name: minnesota_raw_split_thor
  root_path: datasets/pretrain/minnesota/raw_split
  pattern: "ThorFlight*.csv"

  target_fields:
    - navalt
    - alt
    - h
    - navvn
    - navve
    - navvd
    - vn
    - ve
    - vd
    - p
    - q
    - r
  label_col: label
  timestamp_col: time

  seq_len: 32
  stride: 1
  train_val_split: 0.9
  batch_size: 256
  num_workers: 4
  scaler_type: standard

model:
  hidden_size: 128
  num_layers: 2
  num_heads: 4
  ffn_size: 256
  dropout: 0.1
  rms_norm_eps: 0.000001
  rope_theta: 10000.0

optimization:
  lr: 0.0001
  weight_decay: 0.0001

trainer:
  max_epochs: 50
  accelerator: auto
  devices: 1
  precision: 32-true
  log_every_n_steps: 20
  deterministic: false
  mask_ratio: 0.25
  num_sanity_val_steps: 0

early_stopping:
  enabled: true
  monitor: val_loss
  mode: min
  patience: 8
  min_delta: 0.0

checkpoint:
  root_dir: checkpoints
  filename: "{epoch:03d}-{val_loss:.6f}"
  monitor: val_loss
  mode: min
  save_top_k: 1
  save_last: true

logging:
  save_dir: lightning_logs

export:
  save_dir: PretrainedModels
  export_best: true
