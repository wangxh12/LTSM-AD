    - train/carbonZ_2018-10-05-14-37-22_1_no_failure.csv
    - train/carbonZ_2018-10-05-15-52-12_1_no_failure.csv
    - train/carbonZ_2018-10-05-15-52-12_2_no_failure.csv
    - train/carbonZ_2018-10-18-11-08-24_no_failure.csv
  val: null
  test:
    - test/carbonZ_2018-07-18-15-53-31_1_engine_failure.csv
    - test/carbonZ_2018-07-18-15-53-31_2_engine_failure.csv
    - test/carbonZ_2018-07-18-16-22-01_engine_failure.csv
    - test/carbonZ_2018-07-18-16-37-39_2_engine_failure.csv
    - test/carbonZ_2018-07-30-16-29-45_engine_failure.csv
    - test/carbonZ_2018-07-30-16-39-00_1_engine_failure.csv
    - test/carbonZ_2018-07-30-16-39-00_2_engine_failure.csv
    - test/carbonZ_2018-07-30-17-10-45_engine_failure.csv
    - test/carbonZ_2018-07-30-17-20-01_engine_failure.csv
    - test/carbonZ_2018-07-30-17-36-35_engine_failure.csv
    - test/carbonZ_2018-07-30-17-46-31_engine_failure.csv
    - test/carbonZ_2018-09-11-11-56-30_engine_failure.csv
    - test/carbonZ_2018-09-11-14-22-07_1_engine_failure.csv
    - test/carbonZ_2018-09-11-14-22-07_2_engine_failure.csv
    - test/carbonZ_2018-09-11-14-41-51_elevator_failure.csv
    - test/carbonZ_2018-09-11-14-52-54_left_aileron__right_aileron__failure.csv
    - test/carbonZ_2018-09-11-15-05-11_1_elevator_failure.csv
    - test/carbonZ_2018-09-11-15-06-34_1_rudder_right_failure.csv
    - test/carbonZ_2018-09-11-15-06-34_3_rudder_left_failure.csv
    - test/carbonZ_2018-09-11-17-27-13_1_rudder_zero__left_aileron_failure.csv
    - test/carbonZ_2018-09-11-17-27-13_2_both_ailerons_failure.csv
    - test/carbonZ_2018-09-11-17-55-30_1_right_aileron_failure.csv
    - test/carbonZ_2018-09-11-17-55-30_2_left_aileron_failure.csv
    - test/carbonZ_2018-10-05-14-34-20_2_right_aileron_failure.csv
    - test/carbonZ_2018-10-05-14-37-22_2_right_aileron_failure.csv
    - test/carbonZ_2018-10-05-14-37-22_3_left_aileron_failure.csv
    - test/carbonZ_2018-10-05-15-52-12_3_engine_failure.csv
    - test/carbonZ_2018-10-05-15-55-10_engine_failure.csv
    - test/carbonZ_2018-10-05-16-04-46_engine_failure.csv
    - test/carbonZ_2018-10-18-11-03-57_engine_failure.csv
    - test/carbonZ_2018-10-18-11-04-00_engine_failure.csv
    - test/carbonZ_2018-10-18-11-04-08_1_engine_failure.csv
    - test/carbonZ_2018-10-18-11-04-08_2_engine_failure.csv
    - test/carbonZ_2018-10-18-11-04-35_engine_failure.csv

  target_fields:
    - field.angular_velocity.x
    - field.angular_velocity.y
    - field.angular_velocity.z
    - field.linear_acceleration.x
    - field.linear_acceleration.y
    - field.linear_acceleration.z
    - field.magnetic_field.x
    - field.magnetic_field.y
    - field.magnetic_field.z
    - field.fluid_pressure
    - field.temperature
    - field.measured.roll
    - field.measured.pitch
    - field.measured.yaw
  label_col: fault_state
  timestamp_col: time
  seq_len: 40
  stride: 1
  eval_stride: 1
  batch_size: 256
  num_workers: 0
  scaler_type: standard

model:
  patch_size: 4
  d_model: 128
  num_layers: 4
  num_heads: 4
  d_ffn: 256
  dropout: 0.1
  causal: false

optimization:
  lr: 0.00001
  weight_decay: 0.0001
  finetune_scope: reconstruction_head

trainer:
  max_epochs: 20
  accelerator: auto
  devices: 1
  precision: 32-true
  log_every_n_steps: 20
  deterministic: false
  num_sanity_val_steps: 0

evaluation:
  threshold_percentile: 95
  anomaly_ratio: 0.25

logging:
  save_dir: lightning_logs

results:
  root_dir: results_dir
