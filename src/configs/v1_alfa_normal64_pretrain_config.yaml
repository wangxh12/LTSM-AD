seed: 42
model_family: model_v1
model_id: v1-alfa-normal64

data:
  dataset_name: alfa5_17_normal
  root_path: datasets/raw/ALFA5.17/norm
  pattern: "*.csv"
  target_fields:
    - field.angular_velocity.x
    - field.angular_velocity.y
    - field.angular_velocity.z
    - field.linear_acceleration.x
    - field.linear_acceleration.y
    - field.linear_acceleration.z
    - field.magnetic_field.x
    - field.magnetic_field.y
    - field.magnetic_field.z
    - field.fluid_pressure
    - field.temperature
    - field.measured.pitch
    - field.measured.roll
    - field.measured.yaw
    - field.alt_error
    - field.aspd_error
    - field.xtrack_error
    - field.wp_dist
  label_col: null
  timestamp_col: time
  seq_len: 64
  stride: 1
  train_val_split: 0.9
  batch_size: 256
  num_workers: 4
  scaler_type: minmax

model:
  hidden_size: 128
  num_layers: 3
  num_heads: 4
  ffn_size: 512
  dropout: 0.1
  rms_norm_eps: 0.000001
  rope_theta: 10000.0

optimization:
  lr: 0.0002
  weight_decay: 0.01

trainer:
  max_epochs: 60
  early_stopping_patience: 8
  accelerator: auto
  devices: 1
  precision: 32-true
  log_every_n_steps: 20
  deterministic: true
  mask_ratio: 0.25
  num_sanity_val_steps: 0

early_stopping:
  enabled: true
  monitor: val_loss
  mode: min
  patience: 8
  min_delta: 0.0

checkpoint:
  root_dir: checkpoints
  filename: "{epoch:03d}-{val_loss:.6f}"
  monitor: val_loss
  mode: min
  save_top_k: 1
  save_last: true

logging:
  save_dir: lightning_logs

export:
  save_dir: PretrainedModels
  export_best: true
