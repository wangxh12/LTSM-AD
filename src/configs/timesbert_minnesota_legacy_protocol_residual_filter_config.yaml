seed: 42
model_family: model_timesbert
model_id: timesbert-minnesota-legacy-protocol-filtered
run_name: timesbert-minnesota-legacy-protocol-ma9
pretrained_model: null

data:
  datamodule: csv_windows
  dataset_name: minnesota618
  root_path: datasets/finetune/minnesota/minnesota618

  train: train_flight104.csv
  test:
    - ThorFlight121.csv

  target_fields:
    - navalt
    - alt
    - h
    - navvn
    - navve
    - navvd
    - vn
    - ve
    - vd
    - p
    - q
    - r
  label_col: label
  timestamp_col: time

  seq_len: 32
  stride: 1
  eval_stride: 32
  train_val_split: 0.9
  batch_size: 256
  num_workers: 0
  scaler_type: minmax

model:
  d_model: 128
  n_heads: 4
  num_layers: 4
  d_ffn: 512
  patch_len: 4
  dropout: 0.1
  activation: gelu
  norm_first: false

optimization:
  lr: 0.0002
  weight_decay: 0.01

trainer:
  max_epochs: 50
  early_stopping_patience: 7
  accelerator: auto
  devices: 1
  precision: 32-true
  log_every_n_steps: 20
  deterministic: true
  num_sanity_val_steps: 0

evaluation:
  threshold_percentile: 95
  residual_filter:
    enabled: true
    method: moving_average
    window: 9

checkpoint:
  root_dir: checkpoints
  filename: "{epoch}-{step}-{val_loss:.4f}"
  monitor: val_loss
  mode: min
  save_top_k: 1
  save_last: true

logging:
  save_dir: lightning_logs

results:
  root_dir: results_dir
