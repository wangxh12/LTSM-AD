seed: 42
model_id: timesbert-base
pretrain_checkpoint: null

data:
  # data path
  train_path: datasets/finetune/minnesota/train_flight104.csv
  test_paths:
    - datasets/finetune/minnesota/ThorFlight111.csv
    - datasets/finetune/minnesota/ThorFlight112.csv
    - datasets/finetune/minnesota/ThorFlight121.csv

  # fields
  target_fields:
    - navalt
    - alt
    - h
    - navvn
    - navve
    - navvd
    - vn
    - ve
    - vd
    - p
    - q
    - r
  label_col: label
  timestamp_col: time

  seq_len: 32
  stride: 1
  train_val_split: 0.9
  batch_size: 256
  num_workers: 4

model:
  d_model: 128
  n_heads: 4
  num_layers: 2
  d_ffn: 256
  dropout: 0.1


optimization:
  lr: 0.0005
  weight_decay: 0.0001
  loss: mse

trainer:
  max_epochs: 1
  accelerator: auto
  devices: 1
  precision: 32-true
  log_every_n_steps: 20
  deterministic: false

evaluation:
  threshold_percentile: 95

early_stopping:
  enabled: true
  monitor: val_loss
  mode: min
  patience: 7
  min_delta: 0.0001

checkpoint:
  dirpath: checkpoints/vela_masked_reconstruction
  filename: "{epoch}-{step}-{val_loss:.4f}"
  monitor: val_loss
  mode: min
  save_top_k: 1
  save_last: true

outputs:
  root_dir: outputs/uav_ad

